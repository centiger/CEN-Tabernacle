<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#080604" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<link rel="manifest" href="manifest.json" />
<title>CEN Tabernacle</title>
<style>
:root{--gold:#d5a13a;--gold2:#ffd982;--ink:#fff7e9;--dark:#070503;--panel:rgba(9,6,3,.72)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent} html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#070503;color:var(--ink);font-family:"Pretendard","Noto Sans KR","Malgun Gothic",system-ui,sans-serif} button{font:inherit;color:inherit;border:0;background:none} .app{position:fixed;inset:0;overflow:hidden;background:#000}
.bg{position:absolute;inset:0;background:url('scene-overview.jpg') center/cover no-repeat}.bg:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.70),rgba(0,0,0,.12) 54%,rgba(0,0,0,.25)),linear-gradient(0deg,rgba(0,0,0,.70),rgba(0,0,0,0) 45%,rgba(0,0,0,.20))}.homeTop{position:absolute;z-index:4;left:22px;right:22px;top:calc(24px + env(safe-area-inset-top));text-shadow:0 2px 10px #000}.homeTop b{font-size:34px;letter-spacing:-.05em}.homeTop span{display:block;margin-top:6px;font-size:16px;color:#f4e8d4}.hero{position:absolute;z-index:4;left:24px;right:24px;top:25%;text-shadow:0 2px 12px #000}.badge{display:inline-block;border:1px solid rgba(255,217,130,.36);border-radius:999px;background:rgba(0,0,0,.42);color:var(--gold2);padding:8px 13px;font-size:12px;font-weight:900;letter-spacing:.08em}.hero h1{font-size:42px;line-height:1.08;margin:18px 0 12px;letter-spacing:-.08em}.hero p{font-size:18px;line-height:1.62;margin:0;color:#fff0dc}.start{position:absolute;z-index:6;left:24px;right:24px;bottom:calc(30px + env(safe-area-inset-bottom));display:grid;gap:10px}.start button{height:58px;border-radius:20px;background:linear-gradient(180deg,#d6a23a,#96681f);font-weight:950;font-size:19px;box-shadow:0 12px 34px rgba(0,0,0,.35)}.mini{color:#d5c3a4;text-align:center;font-size:13px}.stage{position:absolute;inset:0;z-index:20;display:none;background:#000}.stage.show{display:block}.topbar{position:absolute;z-index:10;left:10px;right:10px;top:calc(10px + env(safe-area-inset-top));display:flex;align-items:center;gap:10px}.round{width:48px;height:48px;border-radius:50%;background:rgba(0,0,0,.50);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900}.title{flex:1;text-align:center;text-shadow:0 2px 8px #000}.title b{font-size:21px;display:block}.title span{font-size:12px;color:#d8c7ad}.scene{position:absolute;inset:0;overflow:hidden;touch-action:none;background:#000}.scene img{position:absolute;left:50%;top:50%;width:100%;height:100%;object-fit:cover;transform:translate(-50%,-50%) scale(1);transition:transform .55s cubic-bezier(.18,.86,.24,1),filter .35s ease;will-change:transform}.shade{position:absolute;inset:0;pointer-events:none;background:linear-gradient(0deg,rgba(0,0,0,.58),rgba(0,0,0,0) 46%,rgba(0,0,0,.15)),linear-gradient(90deg,rgba(0,0,0,.28),rgba(0,0,0,0) 40%,rgba(0,0,0,.22))}.hot{position:absolute;z-index:5;transform:translate(-50%,-50%);display:flex;align-items:center;gap:7px;padding:6px 10px 6px 6px;border-radius:999px;background:rgba(0,0,0,.58);border:1px solid rgba(255,217,130,.55);box-shadow:0 0 0 0 rgba(213,161,58,.55);animation:pulse 2.2s infinite}.hot i{width:28px;height:28px;border-radius:50%;background:var(--gold);color:#211305;display:flex;align-items:center;justify-content:center;font-weight:950;font-style:normal}.hot span{font-size:13px;font-weight:900;white-space:nowrap}@keyframes pulse{70%{box-shadow:0 0 0 18px rgba(213,161,58,0)}}.stageHint{position:absolute;z-index:8;left:50%;bottom:calc(94px + env(safe-area-inset-bottom));transform:translateX(-50%);padding:10px 15px;border-radius:999px;background:rgba(0,0,0,.56);border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(8px);font-size:13px;white-space:nowrap}.film{position:absolute;z-index:9;left:0;right:0;bottom:0;display:flex;gap:8px;overflow-x:auto;padding:12px 12px calc(12px + env(safe-area-inset-bottom));background:linear-gradient(0deg,rgba(0,0,0,.82),rgba(0,0,0,0));scrollbar-width:none}.film::-webkit-scrollbar{display:none}.thumb{flex:0 0 106px;height:65px;border-radius:13px;background-size:cover;background-position:center;border:1px solid rgba(255,255,255,.2);opacity:.78;position:relative;overflow:hidden}.thumb.active{outline:2px solid var(--gold);opacity:1}.thumb span{position:absolute;left:7px;right:7px;bottom:6px;font-size:11px;font-weight:900;text-shadow:0 1px 5px #000}.detail{position:absolute;inset:0;z-index:40;display:none;background:#000}.detail.show{display:block}.detail .scene img{transition:transform .08s linear, object-position .08s linear;transform-origin:center center}.detailSheet{position:absolute;z-index:12;left:12px;right:12px;bottom:calc(12px + env(safe-area-inset-bottom));padding:13px;border-radius:22px;background:var(--panel);border:1px solid rgba(255,217,130,.22);backdrop-filter:blur(14px);box-shadow:0 16px 40px rgba(0,0,0,.38);transition:transform .25s ease}.handle{width:62px;height:5px;border-radius:99px;background:rgba(255,255,255,.28);margin:0 auto 10px}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.tabs button{padding:10px 0;border-radius:999px;background:rgba(255,255,255,.10);font-weight:900;color:#e7d6bd}.tabs button.active{background:linear-gradient(180deg,#d6a23a,#96681f);color:#fff}.bodyTxt{min-height:70px;padding:12px 2px 2px;font-size:15px;line-height:1.65}.tools{position:absolute;z-index:15;right:12px;top:calc(72px + env(safe-area-inset-top));display:flex;flex-direction:column;gap:8px}.tools button,.tools div{width:46px;height:46px;border-radius:50%;background:rgba(0,0,0,.48);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;font-weight:950}.tools div{height:31px;border-radius:999px;font-size:11px;color:#ffdf96}.navSide{position:absolute;z-index:14;left:0;right:0;top:50%;transform:translateY(-50%);display:flex;justify-content:space-between;pointer-events:none;padding:0 8px}.navSide button{pointer-events:auto;width:44px;height:64px;border-radius:22px;background:rgba(0,0,0,.34);border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(8px);font-size:34px;opacity:.84}.modeHint{position:absolute;z-index:14;left:50%;top:calc(72px + env(safe-area-inset-top));transform:translateX(-50%);padding:8px 12px;border-radius:999px;background:rgba(0,0,0,.42);border:1px solid rgba(255,217,130,.16);font-size:12px;color:#f2deae;backdrop-filter:blur(8px);white-space:nowrap}.toast{position:absolute;z-index:99;left:50%;bottom:50%;transform:translateX(-50%);background:rgba(0,0,0,.74);border:1px solid rgba(255,217,130,.20);padding:10px 16px;border-radius:999px;display:none}
@media(max-width:430px){.hero h1{font-size:37px}.hero p{font-size:17px}.homeTop b{font-size:31px}.hot span{display:none}.hot{padding:6px}.stageHint{bottom:calc(88px + env(safe-area-inset-bottom))}.detailSheet{border-radius:20px}.bodyTxt{font-size:14.5px}.modeHint{font-size:11px}}
</style>
</head>
<body>
<div class="app">
  <div class="bg"></div>
  <div class="homeTop"><b>CEN Tabernacle</b><span>성막과 성전을 탐험하는 공간 경험</span></div>
  <section class="hero"><span class="badge">DRONE VIEW</span><h1>하나님의 임재를<br>향한 여정</h1><p>공중에서 전체 구조를 조망하고,<br>각 공간을 터치해 장면으로 들어갑니다.</p></section>
  <div class="start"><button onclick="openStage()">성막 탐험 시작</button><div class="mini">이미지를 직접 만져 확대·이동·회전할 수 있습니다.</div></div>

  <section id="stage" class="stage">
    <div class="scene" id="stageScene"><img id="stageImg" src="scene-overview.jpg" alt="성막 전체"><div class="shade"></div></div>
    <div class="topbar"><button class="round" onclick="closeStage()">‹</button><div class="title"><b>성막</b><span>공간을 터치하여 탐험</span></div><button class="round" onclick="resetStage()">⌖</button></div>
    <button class="hot" style="left:28%;top:67%" onclick="moveTo(0)"><i>1</i><span>입구</span></button>
    <button class="hot" style="left:43%;top:54%" onclick="moveTo(1)"><i>2</i><span>물두멍</span></button>
    <button class="hot" style="left:50%;top:61%" onclick="moveTo(2)"><i>3</i><span>번제단</span></button>
    <button class="hot" style="left:64%;top:41%" onclick="moveTo(3)"><i>4</i><span>성소</span></button>
    <button class="hot" style="left:73%;top:35%" onclick="moveTo(4)"><i>5</i><span>지성소</span></button>
    <div id="stageHint" class="stageHint">원하는 공간을 터치하세요.</div>
    <div id="film" class="film"></div>
  </section>

  <section id="detail" class="detail">
    <div class="scene" id="detailScene"><img id="detailImg" src="scene-laver.jpg" alt="상세 장면"><div class="shade"></div></div>
    <div class="topbar"><button class="round" onclick="backToStage()">‹</button><div class="title"><b id="detailTitle">물두멍</b><span id="detailSub">씻음과 정결의 자리</span></div><button class="round" onclick="toggleSheet()">☰</button></div>
    <div class="modeHint" id="modeHint">두 손가락 확대/축소 · 드래그 이동 · 회전 버튼</div>
    <div class="tools"><button onclick="zoomBy(.25)">＋</button><div id="zoomText">100%</div><button onclick="zoomBy(-.25)">－</button><button onclick="rotateBy(-15)">↶</button><button onclick="rotateBy(15)">↷</button><button onclick="toggleSpinMode()" id="spinBtn">360</button><button onclick="resetTransform()">⟳</button></div>
    <div class="navSide"><button onclick="prevItem()">‹</button><button onclick="nextItem()">›</button></div>
    <div id="detailSheet" class="detailSheet"><div class="handle" onclick="toggleSheet()"></div><div class="tabs"><button class="active" onclick="setTab('overview')">개요</button><button onclick="setTab('bible')">관련 성경</button><button onclick="setTab('meaning')">예표와 의미</button></div><div class="bodyTxt" id="bodyTxt"></div></div>
    <div id="detailFilm" class="film"></div>
  </section>
  <div id="toast" class="toast"></div>
</div>
<script>
const DATA=[
 {id:'entrance',n:1,t:'입구',s:'성막으로 들어가는 유일한 문',img:'scene-overview.jpg',stage:'translate(-50%,-50%) scale(1.85)',txt:{overview:'성막 탐험은 입구에서 시작됩니다. 하나님께 나아가는 첫 관문입니다.',bible:'출애굽기 27:16 — 뜰 문에 대한 규례가 나옵니다.',meaning:'하나님께 나아가는 길은 아무 곳이나 열려 있지 않고, 정해진 문을 통해 시작됩니다.'}},
 {id:'laver',n:2,t:'물두멍',s:'씻음과 정결의 자리',img:'scene-laver.jpg',stage:'translate(-50%,-50%) scale(2.18)',txt:{overview:'제사장들이 성소에 들어가기 전 손과 발을 씻던 놋 물두멍입니다. 이 장면에서는 물두멍을 크게 확대해 볼 수 있습니다.',bible:'출애굽기 30:18-21 — 회막에 들어가기 전에 씻으라는 명령입니다.',meaning:'하나님께 나아가기 전 정결이 필요함을 보여주는 공간입니다.'}},
 {id:'altar',n:3,t:'번제단',s:'제물이 드려지는 자리',img:'scene-altar.jpg',stage:'translate(-50%,-50%) scale(2.05)',txt:{overview:'번제단은 희생 제물이 드려지는 바깥뜰의 중심입니다. 불과 연기가 예배의 첫 장면을 이룹니다.',bible:'출애굽기 27:1-8 — 번제단 제작 규례입니다.',meaning:'죄와 속죄의 문제를 가장 직접적으로 보여주는 장소입니다.'}},
 {id:'sanctuary',n:4,t:'성소',s:'금 등잔대·떡상·분향단의 실내',img:'scene-sanctuary.jpg',stage:'translate(-50%,-50%) scale(2.05)',txt:{overview:'성소 안에는 금 등잔대, 떡상, 분향단이 있습니다. 바깥뜰에서 안쪽 예배 공간으로 들어오는 장면입니다.',bible:'출애굽기 25:23-40, 30:1-10 — 성소 기구에 대한 규례입니다.',meaning:'빛, 생명의 떡, 기도의 향이 함께 놓인 예배의 내적 공간입니다.'}},
 {id:'ark',n:5,t:'지성소',s:'언약궤와 속죄소의 공간',img:'scene-ark.jpg',stage:'translate(-50%,-50%) scale(2.15)',txt:{overview:'지성소는 언약궤와 속죄소가 있는 가장 안쪽 공간입니다. 성막 탐험의 절정입니다.',bible:'출애굽기 25:10-22 — 언약궤와 속죄소 제작 규례입니다.',meaning:'하나님의 임재와 속죄의 중심을 보여주는 공간입니다.'}}
];
let current=0, tab='overview', scale=1, tx=0, ty=0, rot=0, spinMode=false, spinX=50, sheetOpen=true;
const $=id=>document.getElementById(id);
function showToast(m){const t=$('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',1600)}
function renderFilm(){film.innerHTML=DATA.map((d,i)=>`<button class="thumb ${i===current?'active':''}" onclick="moveTo(${i})" style="background-image:url('${d.img}')"><span>${d.t}</span></button>`).join('')}
function renderDetailFilm(){detailFilm.innerHTML=DATA.map((d,i)=>`<button class="thumb ${i===current?'active':''}" onclick="openDetail(${i})" style="background-image:url('${d.img}')"><span>${d.t}</span></button>`).join('')}
function openStage(){stage.classList.add('show');renderFilm();resetStage()}
function closeStage(){stage.classList.remove('show')}
function resetStage(){stageImg.style.transform='translate(-50%,-50%) scale(1)';stageHint.textContent='원하는 공간을 터치하세요.'}
function moveTo(i){current=i;const d=DATA[i];stageHint.textContent=d.t+'로 이동합니다.';stageImg.style.transform=d.stage;setTimeout(()=>openDetail(i),520)}
function openDetail(i){current=i;const d=DATA[i];detail.classList.add('show');detailTitle.textContent=d.t;detailSub.textContent=d.s;detailImg.src=d.img;tab='overview';resetTransform(false);setTab('overview');renderFilm();renderDetailFilm();sheetOpen=true;detailSheet.style.transform='translateY(0)';modeHint.textContent='두 손가락 확대/축소 · 드래그 이동 · 회전 버튼'}
function backToStage(){detail.classList.remove('show');resetStage()}
function setTab(t){tab=t;document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));const idx=t==='overview'?0:t==='bible'?1:2;document.querySelectorAll('.tabs button')[idx].classList.add('active');bodyTxt.textContent=DATA[current].txt[t]}
function nextItem(){openDetail((current+1)%DATA.length)} function prevItem(){openDetail((current-1+DATA.length)%DATA.length)}
function toggleSheet(){sheetOpen=!sheetOpen;detailSheet.style.transform=sheetOpen?'translateY(0)':'translateY(calc(100% - 52px))'}
function applyTransform(){detailImg.style.objectPosition=spinX+'% 50%';detailImg.style.transform=`translate(calc(-50% + ${tx}px),calc(-50% + ${ty}px)) scale(${scale}) rotate(${rot}deg)`;zoomText.textContent=Math.round(scale*100)+'%'}
function zoomBy(v){scale=Math.max(1,Math.min(4,scale+v));if(scale===1){tx=0;ty=0}applyTransform()}
function rotateBy(v){rot=(rot+v)%360;applyTransform()}
function resetTransform(anim=true){scale=1;tx=0;ty=0;rot=0;spinX=50;spinMode=false;spinBtn.style.background='rgba(0,0,0,.48)'; if(!anim){detailImg.style.transition='none';applyTransform();requestAnimationFrame(()=>detailImg.style.transition='transform .08s linear, object-position .08s linear')}else applyTransform()}
function toggleSpinMode(){spinMode=!spinMode;spinBtn.style.background=spinMode?'linear-gradient(180deg,#d6a23a,#96681f)':'rgba(0,0,0,.48)';showToast(spinMode?'가짜 360 보기: 좌우로 드래그':'확대 이동 모드')}
let start=null;
function dist(t){return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY)}
function ang(t){return Math.atan2(t[1].clientY-t[0].clientY,t[1].clientX-t[0].clientX)*180/Math.PI}
detailScene.addEventListener('touchstart',e=>{if(!detail.classList.contains('show'))return;if(e.touches.length===1){start={mode:'drag',x:e.touches[0].clientX,y:e.touches[0].clientY,tx,ty,spinX}}else if(e.touches.length===2){e.preventDefault();start={mode:'pinch',dist:dist(e.touches),ang:ang(e.touches),scale,rot}}},{passive:false});
detailScene.addEventListener('touchmove',e=>{if(!start||!detail.classList.contains('show'))return;if(e.touches.length===2&&start.mode==='pinch'){e.preventDefault();scale=Math.max(1,Math.min(4,start.scale*(dist(e.touches)/start.dist)));rot=(start.rot+(ang(e.touches)-start.ang))%360;applyTransform();return}if(e.touches.length===1&&start.mode==='drag'){e.preventDefault();const dx=e.touches[0].clientX-start.x,dy=e.touches[0].clientY-start.y;if(spinMode){spinX=Math.max(0,Math.min(100,start.spinX-dx*.18));}else if(scale>1){tx=start.tx+dx;ty=start.ty+dy}else{spinX=Math.max(25,Math.min(75,start.spinX-dx*.08));}applyTransform()}},{passive:false});
detailScene.addEventListener('touchend',()=>{start=null;if(scale<=1.01){scale=1;tx=0;ty=0;applyTransform()}},{passive:true});
let dbl=0;detailScene.addEventListener('click',()=>{const n=Date.now();if(n-dbl<320){scale=scale>1?1:2;tx=0;ty=0;applyTransform()}dbl=n});
detailScene.addEventListener('wheel',e=>{if(!detail.classList.contains('show'))return;e.preventDefault();zoomBy(e.deltaY<0?.18:-.18)},{passive:false});
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}))}
</script>
</body>
</html>
