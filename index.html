<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>CEN Tabernacle</title>
<meta name="theme-color" content="#100b07">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <section id="intro" class="intro">
    <div class="introBg"></div>
    <div class="introText">
      <div class="brand">CEN Tabernacle</div>
      <div class="tag">성막과 성전을 탐험하는 공간 경험</div>
      <button id="startBtn">탐험 시작</button>
    </div>
  </section>
  <main id="explorer" class="explorer hidden">
    <div id="stage" class="stage">
      <img id="sceneImg" alt="성막 탐험 장면" draggable="false">
      <div class="shade"></div>
      <div id="labels" class="labels"></div>
      <div id="hint" class="hint"></div>
    </div>
    <header class="topbar">
      <button id="homeBtn" class="topBtn">전체보기</button>
      <div class="titleBox"><span id="sectionText">드론뷰</span><b id="titleText">성막 전체</b></div>
      <button id="miniBtn" class="topBtn">미니맵</button>
    </header>
    <button id="prevBtn" class="sideBtn left">‹</button>
    <button id="nextBtn" class="sideBtn right">›</button>
    <div class="viewBtns">
      <button id="farBtn">멀리</button>
      <button id="midBtn">한걸음</button>
      <button id="nearBtn">근접</button>
      <button id="focusBtn">시야</button>
      <button id="plusBtn">＋</button>
      <button id="minusBtn">－</button>
    </div>
    <aside id="sheet" class="sheet collapsed">
      <button id="sheetHandle" class="handle"><span></span></button>
      <div class="sheetHead"><div id="placeIcon" class="placeIcon">🏕️</div><div><h1 id="placeTitle">성막 전체</h1><p id="placeOne">전체 구조를 먼저 조망합니다.</p></div></div>
      <div class="tabs"><button class="tab active" data-tab="summary">개요</button><button class="tab" data-tab="bible">성경</button><button class="tab" data-tab="meaning">의미</button></div>
      <div id="tabText" class="tabText"></div>
    </aside>
    <nav id="pathBar" class="pathBar"></nav>
    <div id="miniMap" class="mini hidden"><div class="miniTop"><b>성막 동선</b><button id="miniClose">×</button></div><div id="miniList"></div></div>
  </main>
</div>
<script src="data/scenes.js"></script>
<script src="js/explorer.js"></script>
<script>if('serviceWorker' in navigator){addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));}</script>
</body>
</html>
