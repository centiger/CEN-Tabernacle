</style></head><body><div id="home" class="home"><div class="homeBg"></div><div class="homeContent"><div class="brand"><h1>CEN Temple Explorer</h1><p>성막과 세 성전을 직접 걸어보는 공간 탐험</p></div><div id="cards" class="cards"></div></div></div><div id="app" class="app hidden"><div id="stage" class="stage"><img id="sceneImg" class="sceneImg" draggable="false"><div class="shade"></div></div><div id="ui" class="ui"><div class="top"><button id="fitBtn" class="btn">전체보기</button><div class="titleBox"><div id="zone" class="zone">성전</div><div id="title" class="title">전경</div></div><button id="homeBtn" class="btn">홈</button></div><div id="dock" class="dock"><div class="handle"></div><div id="path" class="path"></div></div><div id="sheet" class="sheet"><div class="handle"></div><div class="sheetHead"><div id="sheetIcon" class="sheetIcon">🏛️</div><div><h2 id="sheetTitle">성전</h2><p id="sheetSub">초고해상도 한 장 안을 직접 탐험합니다.</p></div></div><div class="tabs"><button data-tab="overview" class="active">개요</button><button data-tab="bible">성경</button><button data-tab="meaning">의미</button></div><div id="tabText" class="tabText"></div></div><div id="mini" class="miniPanel"><img id="miniImg" src="assets/icons/images/card-solomon.jpg" alt="미니맵"></div></div></div>

const EXPLORERS={...common,solomon:temple('솔로몬 성전','왕정 시대 예루살렘 성전','🏛️','assets/icons/images/card-solomon.jpg',[
['drone','🦅','드론뷰','전경','성전 전체 배치를 한눈에 보는 시작점입니다.','열왕기상 6:1, 역대하 3:1','하나님께서 자기 이름을 두시는 예배의 중심 공간입니다.'],['whole','🏛️','성전 전체','전체','성전 건물과 뜰의 관계를 살펴봅니다.','열왕기상 6장','거룩하신 하나님께 가까이 나아가는 질서를 보여줍니다.'],['court','🌿','바깥뜰','성전 뜰','제사와 정결 의식이 이루어지는 외부 공간입니다.','역대하 4:9','예배는 준비와 질서를 요구합니다.'],['altar','🔥','번제단','바깥뜰','제물이 드려지는 제사의 중심 자리입니다.','역대하 4:1','속죄를 지나 하나님께 나아가는 방향을 보여줍니다.'],['sea','🌊','놋바다','바깥뜰','제사장들이 씻기 위한 큰 물두멍입니다.','열왕기상 7:23-26','예배와 섬김 앞의 정결을 상징합니다.'],['holy','🕎','성소','내부','등잔대, 떡상, 분향단이 놓인 공간입니다.','열왕기상 6:17','빛, 교제, 기도의 예배를 보여줍니다.'],['mostholy','🟪','지성소','내부','성전 가장 안쪽의 거룩한 공간입니다.','열왕기상 6:19-20','하나님의 거룩하심과 임재의 무게를 보여줍니다.'],['ark','✨','언약궤','지성소','지성소 안에 놓인 언약의 궤입니다.','열왕기상 8:6-9','언약, 임재, 속죄의 중심입니다.']]),zerubbabel:temple('스룹바벨 성전','포로 귀환 후 재건된 성전','🌿','assets/icons/images/card-zerubbabel.jpg',[
['drone','🦅','드론뷰','전경','귀환 공동체가 다시 세운 성전입니다.','에스라 3:8-13','무너진 예배가 다시 회복되는 출발점입니다.'],['whole','🏛️','성전 전체','전체','재건된 성전의 전체 구조입니다.','학개 2:3-9','화려함보다 예배 회복이 중요합니다.'],['court','🌿','바깥뜰','뜰','백성과 제사가 만나는 외부 공간입니다.','에스라 3:2-6','회복은 예배의 재개에서 시작됩니다.'],['altar','🔥','번제단','뜰','귀환 후 가장 먼저 회복된 제사 자리입니다.','에스라 3:2-3','예배 회복의 첫 자리가 제단이었습니다.'],['holy','🕎','성소','내부','제사장 섬김이 이어진 성전 내부입니다.','학개 2:3','작아 보여도 하나님께 드려지는 예배는 귀합니다.'],['mostholy','🟪','지성소','내부','언약궤가 사라진 이후의 지성소입니다.','예레미야 3:16','상징이 사라져도 약속과 기다림은 계속됩니다.']]),herod:temple('헤롯 성전','예수 시대의 확장된 성전','🏛️','assets/icons/images/card-herod.jpg',[
['mount','🦅','성전산','전경','거대한 성전산과 성전 복합 공간입니다.','요한복음 2:20','예수 시대 유대 신앙과 사회의 중심 무대였습니다.'],['gentiles','🌍','이방인의 뜰','외부 뜰','가장 넓은 외부 공간입니다.','마태복음 21:12-13','기도의 집이라는 예배의 본질을 보여줍니다.'],['women','🕎','여인의 뜰','안쪽 뜰','남녀 이스라엘 백성이 접근할 수 있던 공간입니다.','마가복음 12:41-44','헌신은 양보다 마음의 진실함으로 평가됩니다.'],['israel','👥','이스라엘 뜰','이스라엘 뜰','이스라엘 남자들이 접근하던 영역입니다.','누가복음 1:10','거룩함의 단계와 접근의 질서를 보여줍니다.'],['priests','🔥','제사장의 뜰','제사장 영역','제사장들이 제사를 집행하던 공간입니다.','누가복음 1:8-11','예배는 섬김과 직무를 통해 이루어졌습니다.'],['holy','🕎','성소','내부','분향과 등불의 섬김이 있던 공간입니다.','누가복음 1:9-11','기도와 섬김, 약속이 만나는 공간입니다.'],['mostholy','🟪','지성소','내부','휘장 너머 가장 안쪽의 공간입니다.','마태복음 27:51','그리스도 안에서 하나님께 나아가는 길이 열렸음을 보여줍니다.']])};
let mode='home',scenes=[],idx=0,imgW=0,imgH=0,scale=1,minScale=1,maxScale=5,x=0,y=0,tab='overview',moved=false;const $=id=>document.getElementById(id),home=$('home'),cards=$('cards'),app=$('app'),stage=$('stage'),img=$('sceneImg'),title=$('title'),zone=$('zone'),path=$('path'),sheet=$('sheet'),sheetTitle=$('sheetTitle'),sheetSub=$('sheetSub'),sheetIcon=$('sheetIcon'),tabText=$('tabText'),mini=$('mini'),miniImg=$('miniImg');
function renderHome(){cards.innerHTML=Object.entries(EXPLORERS).map(([id,e])=>`<button class="homeCard" data-mode="${id}"><div class="thumb" style="background-image:url('${e.card}')"></div><div class="cardBody"><div class="cardIcon">${e.icon}</div><div><h2>${e.name}</h2><p>${e.sub}</p></div><div class="enter">›</div></div></button>`).join('');cards.querySelectorAll('.homeCard').forEach(c=>c.onclick=()=>loadExplorer(c.dataset.mode));}
function loadExplorer(id){mode=id;let e=EXPLORERS[id];scenes=e.scenes;idx=0;tab='overview';home.classList.add('hidden');app.classList.remove('hidden');app.classList.remove('clean');miniImg.src=e.mini;buildPath();go(0,'whole');history.pushState({view:'explorer',mode:id},'',`#${id}`)}
function closeHome(push=true){mode='home';app.classList.add('hidden');home.classList.remove('hidden');sheet.classList.remove('open');mini.classList.remove('open');if(push)history.pushState({view:'home'},'',location.pathname+location.search)}
function buildPath(){path.innerHTML=scenes.map((s,i)=>`<button type="button" data-i="${i}"><span class="ico">${s.icon}</span><span>${s.title}</span></button>`).join('');path.querySelectorAll('button').forEach(b=>{let f=e=>{e.preventDefault();e.stopPropagation();go(+b.dataset.i,'step')};b.addEventListener('click',f);b.addEventListener('pointerup',f)})}
function active(){let s=scenes[idx];path.querySelectorAll('button').forEach((b,i)=>{b.classList.toggle('active',i===idx);if(i===idx)b.scrollIntoView({inline:'center',block:'nearest'})});title.textContent=s.title;zone.textContent=s.zone;sheetIcon.textContent=s.icon;sheetTitle.textContent=s.title;sheetSub.textContent=s.sub;tabText.textContent=s[tab]||'';document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab))}
function contain(){let r=stage.getBoundingClientRect();return Math.min(r.width/imgW,r.height/imgH)}function cover(){let r=stage.getBoundingClientRect();return Math.max(r.width/imgW,r.height/imgH)}function clamp(){let r=stage.getBoundingClientRect(),w=imgW*scale,h=imgH*scale;if(w<=r.width)x=(r.width-w)/2;else x=Math.min(0,Math.max(r.width-w,x));if(h<=r.height)y=(r.height-h)/2;else y=Math.min(0,Math.max(r.height-h,y))}function apply(){clamp();img.style.width=imgW+'px';img.style.height=imgH+'px';img.style.transform=`translate3d(${x}px,${y}px,0) scale(${scale})`}function setScale(ns,cx=innerWidth/2,cy=innerHeight/2){let old=scale||1;scale=Math.min(maxScale,Math.max(minScale,ns));x=cx-(cx-x)*(scale/old);y=cy-(cy-y)*(scale/old);apply()}function whole(){scale=contain();minScale=scale;x=(stage.clientWidth-imgW*scale)/2;y=(stage.clientHeight-imgH*scale)/2;apply();app.classList.remove('clean')}function step(){minScale=contain();scale=Math.max(cover(),minScale);x=(stage.clientWidth-imgW*scale)/2;y=(stage.clientHeight-imgH*scale)/2;apply();app.classList.remove('clean')}
function go(i,view='step'){idx=(i+scenes.length)%scenes.length;let s=scenes[idx];sheet.classList.remove('open');mini.classList.remove('open');img.onload=()=>{imgW=img.naturalWidth;imgH=img.naturalHeight;maxScale=Math.max(4,contain()*6);view==='whole'?whole():step();active()};if(img.getAttribute('src')===s.img)img.onload();else img.src=s.img;history.replaceState({view:'explorer',mode,idx},'',`#${mode}/${s.id}`);active()}
let pointers=new Map(),drag=false,lx=0,ly=0,ld=0,ls=1,lastTap=0;stage.addEventListener('pointerdown',e=>{stage.setPointerCapture(e.pointerId);pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});moved=false;if(pointers.size===1){drag=true;lx=e.clientX;ly=e.clientY}else if(pointers.size===2){let p=[...pointers.values()];ld=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);ls=scale}});stage.addEventListener('pointermove',e=>{if(!pointers.has(e.pointerId))return;pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});if(pointers.size===2){moved=true;let p=[...pointers.values()],d=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y),cx=(p[0].x+p[1].x)/2,cy=(p[0].y+p[1].y)/2;setScale(ls*(d/ld),cx,cy)}else if(drag&&pointers.size===1){let dx=e.clientX-lx,dy=e.clientY-ly;if(Math.abs(dx)+Math.abs(dy)>3)moved=true;x+=dx;y+=dy;lx=e.clientX;ly=e.clientY;apply()}});function up(e){pointers.delete(e.pointerId);if(pointers.size===0){drag=false;let now=Date.now();if(!moved&&now-lastTap<280){scale<cover()*1.5?setScale(cover()*2,e.clientX,e.clientY):step();lastTap=0}else lastTap=now}}stage.addEventListener('pointerup',up);stage.addEventListener('pointercancel',up);stage.addEventListener('click',e=>{if(moved){moved=false;return}if(e.target===stage||e.target===img)app.classList.toggle('clean')});$('fitBtn').onclick=e=>{e.stopPropagation();whole()};$('homeBtn').onclick=e=>{e.stopPropagation();closeHome(true)};sheet.onclick=e=>{e.stopPropagation();sheet.classList.toggle('open');app.classList.remove('clean')};document.querySelectorAll('.tabs button').forEach(b=>b.onclick=e=>{e.stopPropagation();tab=b.dataset.tab;active();sheet.classList.add('open')});window.onresize=()=>{if(mode!=='home')step()};window.onpopstate=()=>{if(mode!=='home')closeHome(false);else history.pushState({view:'home'},'',location.pathname+location.search)};if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js');renderHome();history.replaceState({view:'home'},'',location.pathname+location.search);
</script></body></html>
