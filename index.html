<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#080604" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<link rel="manifest" href="manifest.json" />
<title>CEN Tabernacle</title>
<style>
:root{--gold:#d5a13a;--gold2:#ffdf8f;--ink:#fff7e9;--muted:#d8c7ad;--panel:rgba(9,6,3,.74);--line:rgba(255,217,130,.24)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#070503;color:var(--ink);font-family:"Pretendard","Noto Sans KR","Malgun Gothic",system-ui,sans-serif}button{font:inherit;color:inherit;border:0;background:none}.app{position:fixed;inset:0;overflow:hidden;background:#000}.hide{display:none!important}
.bg{position:absolute;inset:0;background:url('scene-overview.jpg') center/cover no-repeat}.bg:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.72),rgba(0,0,0,.12) 58%,rgba(0,0,0,.30)),linear-gradient(0deg,rgba(0,0,0,.74),rgba(0,0,0,0) 48%,rgba(0,0,0,.22))}.homeTop{position:absolute;z-index:4;left:22px;right:22px;top:calc(24px + env(safe-area-inset-top));text-shadow:0 2px 10px #000}.homeTop b{font-size:34px;letter-spacing:-.05em}.homeTop span{display:block;margin-top:6px;font-size:16px;color:#f4e8d4}.hero{position:absolute;z-index:4;left:24px;right:24px;top:25%;text-shadow:0 2px 12px #000}.badge{display:inline-block;border:1px solid rgba(255,217,130,.36);border-radius:999px;background:rgba(0,0,0,.42);color:var(--gold2);padding:8px 13px;font-size:12px;font-weight:900;letter-spacing:.08em}.hero h1{font-size:42px;line-height:1.08;margin:18px 0 12px;letter-spacing:-.08em}.hero p{font-size:18px;line-height:1.62;margin:0;color:#fff0dc}.start{position:absolute;z-index:6;left:24px;right:24px;bottom:calc(30px + env(safe-area-inset-bottom));display:grid;gap:10px}.start button{height:58px;border-radius:20px;background:linear-gradient(180deg,#d6a23a,#96681f);font-weight:950;font-size:19px;box-shadow:0 12px 34px rgba(0,0,0,.35)}.mini{color:#d5c3a4;text-align:center;font-size:13px}
.stage,.detail{position:absolute;inset:0;z-index:20;display:none;background:#000}.stage.show,.detail.show{display:block}.scene{position:absolute;inset:0;overflow:hidden;touch-action:none;background:#000}.scene img{position:absolute;left:50%;top:50%;width:100%;height:100%;object-fit:cover;transform:translate(-50%,-50%) scale(1);transition:transform .62s cubic-bezier(.18,.86,.24,1),filter .35s ease,object-position .12s linear;will-change:transform}.shade{position:absolute;inset:0;pointer-events:none;background:linear-gradient(0deg,rgba(0,0,0,.60),rgba(0,0,0,0) 46%,rgba(0,0,0,.15)),linear-gradient(90deg,rgba(0,0,0,.30),rgba(0,0,0,0) 42%,rgba(0,0,0,.22))}
.topbar{position:absolute;z-index:10;left:10px;right:10px;top:calc(10px + env(safe-area-inset-top));display:flex;align-items:center;gap:9px}.round{width:46px;height:46px;border-radius:50%;background:rgba(0,0,0,.50);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900}.title{flex:1;text-align:center;text-shadow:0 2px 8px #000;min-width:0}.title b{font-size:20px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.title span{font-size:12px;color:#d8c7ad}.crumb{position:absolute;z-index:11;left:50%;top:calc(62px + env(safe-area-inset-top));transform:translateX(-50%);padding:7px 11px;border-radius:999px;background:rgba(0,0,0,.48);border:1px solid rgba(255,217,130,.18);backdrop-filter:blur(8px);font-size:12px;color:#f1d9ad;white-space:nowrap}.crumb b{color:#fff}
.hot{position:absolute;z-index:5;transform:translate(-50%,-50%);display:flex;align-items:center;gap:7px;padding:7px 11px 7px 7px;border-radius:999px;background:rgba(0,0,0,.62);border:1px solid rgba(255,217,130,.58);box-shadow:0 0 0 0 rgba(213,161,58,.55);animation:pulse 2.2s infinite}.hot i{width:28px;height:28px;border-radius:50%;background:var(--gold);color:#211305;display:flex;align-items:center;justify-content:center;font-weight:950;font-style:normal}.hot span{font-size:13px;font-weight:950;white-space:nowrap}.hot.active{background:rgba(117,80,18,.78);border-color:var(--gold2)}@keyframes pulse{70%{box-shadow:0 0 0 18px rgba(213,161,58,0)}}.stageHint,.focusLabel{position:absolute;z-index:8;left:50%;transform:translateX(-50%);padding:10px 15px;border-radius:999px;background:rgba(0,0,0,.58);border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(8px);font-size:13px;white-space:nowrap}.stageHint{bottom:calc(112px + env(safe-area-inset-bottom))}.focusLabel{top:calc(104px + env(safe-area-inset-top));font-weight:900;color:#fff1c8;opacity:0;transition:opacity .25s ease}.focusLabel.show{opacity:1}.film{position:absolute;z-index:9;left:0;right:0;bottom:0;display:flex;gap:8px;overflow-x:auto;padding:12px 12px calc(12px + env(safe-area-inset-bottom));background:linear-gradient(0deg,rgba(0,0,0,.86),rgba(0,0,0,0));scrollbar-width:none}.film::-webkit-scrollbar{display:none}.thumb{flex:0 0 106px;height:65px;border-radius:13px;background-size:cover;background-position:center;border:1px solid rgba(255,255,255,.20);opacity:.75;position:relative;overflow:hidden}.thumb.active{outline:2px solid var(--gold);opacity:1}.thumb span{position:absolute;left:7px;right:7px;bottom:6px;font-size:11px;font-weight:950;text-shadow:0 1px 5px #000}.thumb:after{content:"";position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.62),rgba(0,0,0,0) 60%)}.thumb span{z-index:2}
.detail{z-index:40}.detail .scene img{transition:transform .08s linear,object-position .08s linear;transform-origin:center center}.tools{position:absolute;z-index:15;right:12px;top:calc(94px + env(safe-area-inset-top));display:flex;flex-direction:column;gap:8px}.tools button,.tools div{width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,.48);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;font-weight:950}.tools div{height:31px;border-radius:999px;font-size:11px;color:#ffdf96}.quickNav{position:absolute;z-index:13;left:12px;right:12px;bottom:calc(94px + env(safe-area-inset-bottom));display:grid;grid-template-columns:1fr auto 1fr;gap:7px;align-items:center;pointer-events:none}.quickNav button,.quickNav .now{pointer-events:auto;min-height:44px;border-radius:999px;background:rgba(0,0,0,.58);border:1px solid rgba(255,217,130,.20);backdrop-filter:blur(10px);font-size:13px;font-weight:950;display:flex;align-items:center;justify-content:center;text-align:center;padding:0 10px}.quickNav .now{color:#ffdf96;border-color:rgba(255,217,130,.45);max-width:128px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.detailSheet{position:absolute;z-index:12;left:12px;right:12px;bottom:calc(12px + env(safe-area-inset-bottom));padding:12px;border-radius:22px;background:var(--panel);border:1px solid var(--line);backdrop-filter:blur(14px);box-shadow:0 16px 40px rgba(0,0,0,.38);transition:transform .25s ease}.handle{width:62px;height:5px;border-radius:99px;background:rgba(255,255,255,.28);margin:0 auto 10px}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.tabs button{padding:9px 0;border-radius:999px;background:rgba(255,255,255,.10);font-weight:900;color:#e7d6bd}.tabs button.active{background:linear-gradient(180deg,#d6a23a,#96681f);color:#fff}.bodyTxt{min-height:56px;padding:10px 2px 0;font-size:14.5px;line-height:1.58}.progress{position:absolute;z-index:14;left:14px;right:14px;top:calc(100px + env(safe-area-inset-top));display:flex;align-items:center;gap:4px}.dot{flex:1;height:5px;border-radius:99px;background:rgba(255,255,255,.23);position:relative}.dot.done,.dot.active{background:var(--gold)}.dot.active:after{content:"";position:absolute;left:50%;top:50%;width:16px;height:16px;border-radius:50%;background:var(--gold2);transform:translate(-50%,-50%);box-shadow:0 0 16px rgba(255,217,130,.85)}.minimapBtn{position:absolute;z-index:16;left:12px;top:calc(94px + env(safe-area-inset-top));width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,.48);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(8px);font-size:20px}.minimap{position:absolute;z-index:50;right:12px;top:calc(94px + env(safe-area-inset-top));width:190px;border-radius:20px;background:rgba(8,5,3,.84);border:1px solid rgba(255,217,130,.22);backdrop-filter:blur(14px);padding:10px;box-shadow:0 14px 40px rgba(0,0,0,.40)}.miniTitle{font-size:12px;font-weight:950;color:#ffdf96;margin:2px 4px 8px}.miniMapBox{position:relative;height:118px;border-radius:14px;background:url('scene-overview.jpg') center/cover no-repeat;overflow:hidden;border:1px solid rgba(255,255,255,.14)}.miniMapBox:after{content:"";position:absolute;inset:0;background:rgba(0,0,0,.30)}.miniPt{position:absolute;z-index:3;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.68);border:1px solid var(--gold2);transform:translate(-50%,-50%);font-size:10px;color:#fff;font-weight:950}.miniPt.active{background:var(--gold);color:#211305}.toast{position:absolute;z-index:99;left:50%;bottom:50%;transform:translateX(-50%);background:rgba(0,0,0,.76);border:1px solid rgba(255,217,130,.20);padding:10px 16px;border-radius:999px;display:none;white-space:nowrap}.installNote{position:absolute;z-index:99;left:12px;right:12px;bottom:calc(12px + env(safe-area-inset-bottom));padding:12px;border-radius:16px;background:rgba(0,0,0,.68);border:1px solid rgba(255,217,130,.22);font-size:12px;text-align:center;display:none}
@media(max-width:430px){.hero h1{font-size:37px}.hero p{font-size:17px}.homeTop b{font-size:31px}.hot span{font-size:12px}.hot{padding:6px 9px 6px 6px}.hot i{width:26px;height:26px}.stageHint{bottom:calc(104px + env(safe-area-inset-bottom))}.detailSheet{border-radius:20px}.bodyTxt{font-size:14px}.quickNav{bottom:calc(89px + env(safe-area-inset-bottom))}.quickNav button,.quickNav .now{font-size:12px;min-height:41px;padding:0 8px}.tools{right:8px}.tools button,.tools div{width:40px;height:40px}.tools div{height:28px}.minimap{width:176px}.crumb{font-size:11px}.progress{top:calc(96px + env(safe-area-inset-top))}}
</style>
</head>
<body>
<div class="app">
  <div class="bg"></div>
  <div class="homeTop"><b>CEN Tabernacle</b><span>성막과 성전을 탐험하는 공간 경험</span></div>
  <section class="hero"><span class="badge">DRONE VIEW</span><h1>하나님의 임재를<br>향한 여정</h1><p>공중에서 전체 구조를 조망하고,<br>각 공간을 터치해 장면으로 들어갑니다.</p></section>
  <div class="start"><button onclick="openStage()">성막 탐험 시작</button><div class="mini">장소 이름 표시 · 바로 이동 · 확대/축소 · 뒤로가기 안정화</div></div>

  <section id="stage" class="stage">
    <div class="scene" id="stageScene"><img id="stageImg" src="scene-overview.jpg" alt="성막 전체"><div class="shade"></div></div>
    <div class="topbar"><button class="round" onclick="goBack()">‹</button><div class="title"><b>성막 드론뷰</b><span>공간 이름을 보고 터치하세요</span></div><button class="round" onclick="resetStage()">⌖</button></div>
    <div class="crumb">성막 › <b>드론뷰</b></div>
    <button class="hot" style="left:28%;top:67%" onclick="moveTo(0)"><i>🚪</i><span>입구</span></button>
    <button class="hot" style="left:43%;top:54%" onclick="moveTo(1)"><i>💧</i><span>물두멍</span></button>
    <button class="hot" style="left:50%;top:61%" onclick="moveTo(2)"><i>🔥</i><span>번제단</span></button>
    <button class="hot" style="left:64%;top:41%" onclick="moveTo(3)"><i>🕯️</i><span>성소</span></button>
    <button class="hot" style="left:73%;top:35%" onclick="moveTo(4)"><i>📦</i><span>지성소</span></button>
    <div id="stageHint" class="stageHint">원하는 공간을 터치하세요.</div>
    <div id="focusLabel" class="focusLabel"></div>
    <div id="film" class="film"></div>
  </section>

  <section id="detail" class="detail">
    <div class="scene" id="detailScene"><img id="detailImg" src="scene-laver.jpg" alt="상세 장면"><div class="shade"></div></div>
    <div class="topbar"><button class="round" onclick="goBack()">‹</button><div class="title"><b id="detailTitle">물두멍</b><span id="detailSub">씻음과 정결의 자리</span></div><button class="round" onclick="toggleSheet()">☰</button></div>
    <div class="crumb" id="detailCrumb">성막 › 바깥뜰 › <b>물두멍</b></div>
    <div class="progress" id="progress"></div>
    <button class="minimapBtn" onclick="toggleMiniMap()">🗺</button>
    <div id="minimap" class="minimap hide"><div class="miniTitle">전체 성막에서 현재 위치</div><div class="miniMapBox" id="miniMapBox"></div></div>
    <div class="tools"><button onclick="zoomBy(.25)">＋</button><div id="zoomText">100%</div><button onclick="zoomBy(-.25)">－</button><button onclick="resetTransform()">⟳</button></div>
    <div class="quickNav"><button id="prevBtn" onclick="prevItem()">◀ 이전</button><div class="now" id="nowPlace">물두멍</div><button id="nextBtn" onclick="nextItem()">다음 ▶</button></div>
    <div id="detailSheet" class="detailSheet"><div class="handle" onclick="toggleSheet()"></div><div class="tabs"><button class="active" onclick="setTab('overview')">개요</button><button onclick="setTab('bible')">관련 성경</button><button onclick="setTab('meaning')">예표와 의미</button></div><div class="bodyTxt" id="bodyTxt"></div></div>
    <div id="detailFilm" class="film"></div>
  </section>
  <div id="toast" class="toast"></div>
</div>
<script>
const DATA=[
 {id:'entrance',icon:'🚪',area:'바깥뜰',t:'입구',s:'성막으로 들어가는 유일한 문',img:'scene-overview.jpg',stage:'translate(-50%,-50%) scale(1.85)',pos:[28,67],txt:{overview:'성막 탐험은 입구에서 시작됩니다. 하나님께 나아가는 첫 관문입니다.',bible:'출애굽기 27:16 — 뜰 문에 대한 규례가 나옵니다.',meaning:'하나님께 나아가는 길은 아무 곳이나 열려 있지 않고, 정해진 문을 통해 시작됩니다.'}},
 {id:'laver',icon:'💧',area:'바깥뜰',t:'물두멍',s:'씻음과 정결의 자리',img:'scene-laver.jpg',stage:'translate(-50%,-50%) scale(2.18)',pos:[43,54],txt:{overview:'제사장들이 성소에 들어가기 전 손과 발을 씻던 놋 물두멍입니다. 이 장면에서는 물두멍을 크게 확대해 볼 수 있습니다.',bible:'출애굽기 30:18-21 — 회막에 들어가기 전에 씻으라는 명령입니다.',meaning:'하나님께 나아가기 전 정결이 필요함을 보여주는 공간입니다.'}},
 {id:'altar',icon:'🔥',area:'바깥뜰',t:'번제단',s:'제물이 드려지는 자리',img:'scene-altar.jpg',stage:'translate(-50%,-50%) scale(2.05)',pos:[50,61],txt:{overview:'번제단은 희생 제물이 드려지는 바깥뜰의 중심입니다. 불과 연기가 예배의 첫 장면을 이룹니다.',bible:'출애굽기 27:1-8 — 번제단 제작 규례입니다.',meaning:'죄와 속죄의 문제를 가장 직접적으로 보여주는 장소입니다.'}},
 {id:'sanctuary',icon:'🕯️',area:'성소',t:'성소',s:'금 등잔대·떡상·분향단의 실내',img:'scene-sanctuary.jpg',stage:'translate(-50%,-50%) scale(2.05)',pos:[64,41],txt:{overview:'성소 안에는 금 등잔대, 떡상, 분향단이 있습니다. 바깥뜰에서 안쪽 예배 공간으로 들어오는 장면입니다.',bible:'출애굽기 25:23-40, 30:1-10 — 성소 기구에 대한 규례입니다.',meaning:'빛, 생명의 떡, 기도의 향이 함께 놓인 예배의 내적 공간입니다.'}},
 {id:'ark',icon:'📦',area:'지성소',t:'지성소',s:'언약궤와 속죄소의 공간',img:'scene-ark.jpg',stage:'translate(-50%,-50%) scale(2.15)',pos:[73,35],txt:{overview:'지성소는 언약궤와 속죄소가 있는 가장 안쪽 공간입니다. 성막 탐험의 절정입니다.',bible:'출애굽기 25:10-22 — 언약궤와 속죄소 제작 규례입니다.',meaning:'하나님의 임재와 속죄의 중심을 보여주는 공간입니다.'}}
];
let current=0, tab='overview', scale=1, tx=0, ty=0, sheetOpen=true, appState='home', suppressPop=false;
const $=id=>document.getElementById(id);
function toast(m){const t=$('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',1400)}
function pushState(state){appState=state; if(!suppressPop) history.pushState({cenState:state},'',location.href)}
function openStage(){document.getElementById('stage').classList.add('show');document.getElementById('detail').classList.remove('show');pushState('stage');renderFilm();resetStage();toast('드론뷰에서 장소 이름을 눌러 이동')}
function closeStage(){document.getElementById('stage').classList.remove('show');appState='home'}
function goBack(){ if(document.getElementById('detail').classList.contains('show')){backToStage();return} if(document.getElementById('stage').classList.contains('show')){closeStage();return} }
window.addEventListener('popstate',()=>{suppressPop=true;goBack();setTimeout(()=>suppressPop=false,50)});
function resetStage(){stageImg.style.transform='translate(-50%,-50%) scale(1)';stageHint.textContent='원하는 공간을 터치하세요.';focusLabel.classList.remove('show');document.querySelectorAll('.hot').forEach(h=>h.classList.remove('active'))}
function renderFilm(){film.innerHTML=DATA.map((d,i)=>`<button class="thumb ${i===current?'active':''}" onclick="moveTo(${i})" style="background-image:url('${d.img}')"><span>${d.icon} ${d.t}</span></button>`).join('')}
function renderDetailFilm(){detailFilm.innerHTML=DATA.map((d,i)=>`<button class="thumb ${i===current?'active':''}" onclick="openDetail(${i},true)" style="background-image:url('${d.img}')"><span>${d.icon} ${d.t}</span></button>`).join('')}
function moveTo(i){current=i;const d=DATA[i];stageHint.textContent=`${d.icon} ${d.t}로 이동합니다`;focusLabel.textContent=`현재 선택: ${d.icon} ${d.t}`;focusLabel.classList.add('show');stageImg.style.transform=d.stage;document.querySelectorAll('.hot').forEach((h,idx)=>h.classList.toggle('active',idx===i));renderFilm();setTimeout(()=>openDetail(i,false),620)}
function openDetail(i,fromDetail=false){current=i;const d=DATA[i];document.getElementById('detail').classList.add('show');detailTitle.textContent=`${d.icon} ${d.t}`;detailSub.textContent=d.s;detailCrumb.innerHTML=`성막 › ${d.area} › <b>${d.t}</b>`;detailImg.src=d.img;nowPlace.textContent=`${d.icon} ${d.t}`;prevBtn.textContent=`◀ ${DATA[(i-1+DATA.length)%DATA.length].t}`;nextBtn.textContent=`${DATA[(i+1)%DATA.length].t} ▶`;tab='overview';resetTransform(false);setTab('overview');renderFilm();renderDetailFilm();renderProgress();renderMiniMap();sheetOpen=true;detailSheet.style.transform='translateY(0)';if(!fromDetail) pushState('detail')}
function backToStage(){document.getElementById('detail').classList.remove('show');appState='stage';resetStage();renderFilm();toast('드론뷰로 돌아왔습니다')}
function setTab(t){tab=t;document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));const idx=t==='overview'?0:t==='bible'?1:2;document.querySelectorAll('.tabs button')[idx].classList.add('active');bodyTxt.textContent=DATA[current].txt[t]}
function nextItem(){openDetail((current+1)%DATA.length,true);toast(`${DATA[current].icon} ${DATA[current].t}`)}function prevItem(){openDetail((current-1+DATA.length)%DATA.length,true);toast(`${DATA[current].icon} ${DATA[current].t}`)}
function toggleSheet(){sheetOpen=!sheetOpen;detailSheet.style.transform=sheetOpen?'translateY(0)':'translateY(calc(100% - 48px))'}
function renderProgress(){progress.innerHTML=DATA.map((d,i)=>`<div class="dot ${i<current?'done':i===current?'active':''}"></div>`).join('')}
function toggleMiniMap(){minimap.classList.toggle('hide')}function renderMiniMap(){miniMapBox.innerHTML=DATA.map((d,i)=>`<button class="miniPt ${i===current?'active':''}" onclick="openDetail(${i},true)" style="left:${d.pos[0]}%;top:${d.pos[1]}%">${i+1}</button>`).join('')}
function applyTransform(){detailImg.style.transform=`translate(calc(-50% + ${tx}px),calc(-50% + ${ty}px)) scale(${scale})`;zoomText.textContent=Math.round(scale*100)+'%'}
function zoomBy(v){scale=Math.max(1,Math.min(4,scale+v));if(scale===1){tx=0;ty=0}applyTransform()}function resetTransform(anim=true){scale=1;tx=0;ty=0;if(!anim){detailImg.style.transition='none';applyTransform();requestAnimationFrame(()=>detailImg.style.transition='transform .08s linear,object-position .08s linear')}else applyTransform()}
let start=null;function dist(t){return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY)}
detailScene.addEventListener('touchstart',e=>{if(!detail.classList.contains('show'))return;if(e.touches.length===1){start={mode:'drag',x:e.touches[0].clientX,y:e.touches[0].clientY,tx,ty}}else if(e.touches.length===2){e.preventDefault();start={mode:'pinch',dist:dist(e.touches),scale}}},{passive:false});
detailScene.addEventListener('touchmove',e=>{if(!start||!detail.classList.contains('show'))return;if(e.touches.length===2&&start.mode==='pinch'){e.preventDefault();scale=Math.max(1,Math.min(4,start.scale*(dist(e.touches)/start.dist)));applyTransform();return}if(e.touches.length===1&&start.mode==='drag'){e.preventDefault();const dx=e.touches[0].clientX-start.x,dy=e.touches[0].clientY-start.y;if(scale>1){tx=start.tx+dx;ty=start.ty+dy;applyTransform()}}},{passive:false});
detailScene.addEventListener('touchend',()=>{start=null;if(scale<=1.01){scale=1;tx=0;ty=0;applyTransform()}},{passive:true});
let dbl=0;detailScene.addEventListener('click',()=>{const n=Date.now();if(n-dbl<320){scale=scale>1?1:2;tx=0;ty=0;applyTransform()}dbl=n});
detailScene.addEventListener('wheel',e=>{if(!detail.classList.contains('show'))return;e.preventDefault();zoomBy(e.deltaY<0?.18:-.18)},{passive:false});
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}))}
</script>
