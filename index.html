<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="theme-color" content="#080604" />
<title>CEN Tabernacle</title>
<link rel="manifest" href="manifest.webmanifest">
<style>
:root{--gold:#d8a33a;--soft:#f5ead5;--panel:rgba(10,7,4,.72);--line:rgba(255,230,180,.25)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;background:#050403;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden}.app{position:fixed;inset:0;background:#050403;overflow:hidden}.stage{position:absolute;inset:0;background:#000;touch-action:none;overflow:hidden}.scene{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;will-change:transform,opacity;transition:opacity .28s ease,transform .42s cubic-bezier(.2,.8,.2,1)}.scene.contain{object-fit:contain;background:#050403}.scene.wide{object-fit:cover}.fade{animation:fade .35s ease}@keyframes fade{from{opacity:.3;filter:blur(2px)}to{opacity:1;filter:blur(0)}}button{font:inherit;color:#fff;border:0;background:none}.pill{border:1px solid var(--line);background:var(--panel);backdrop-filter:blur(16px);border-radius:22px;box-shadow:0 12px 28px rgba(0,0,0,.35)}.top{position:absolute;z-index:20;top:calc(env(safe-area-inset-top) + 14px);left:16px;right:16px;display:flex;align-items:center;gap:12px;transition:.3s}.top button{padding:14px 16px;font-weight:900;font-size:16px;min-width:88px}.title{flex:1;text-align:center;padding:10px 16px}.title small{display:block;color:#d4bfa1;font-weight:850;font-size:12px}.title b{display:block;font-size:21px;letter-spacing:-.03em}.top.hidden,.side.hidden,.bottom.hidden,.sheet.hidden,.arrow.hidden{opacity:0;pointer-events:none}.side{position:absolute;z-index:21;right:14px;top:49%;transform:translateY(-50%);display:flex;flex-direction:column;gap:10px;transition:.3s}.side button{width:58px;height:54px;font-size:21px;font-weight:950}.side .txt{font-size:14px;line-height:1.1}.arrow{position:absolute;z-index:19;top:48%;width:52px;height:72px;border:1px solid var(--line);background:rgba(10,7,4,.40);border-radius:28px;font-size:40px;color:#fff;backdrop-filter:blur(12px);transition:.25s}.arrow.left{left:14px}.arrow.right{right:14px}.bottom{position:absolute;z-index:25;left:14px;right:14px;bottom:calc(env(safe-area-inset-bottom) + 14px);transition:.3s}.nav{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:8px;border:1px solid var(--line);background:rgba(15,11,7,.76);backdrop-filter:blur(18px);border-radius:24px}.nav button{padding:9px 3px;border-radius:17px;color:#bcae98;font-weight:850;font-size:13px;display:flex;flex-direction:column;align-items:center;gap:4px}.nav .ico{font-size:22px}.nav button.active{background:linear-gradient(180deg,rgba(216,163,58,.58),rgba(85,54,20,.78));color:#fff;box-shadow:0 0 0 1px rgba(255,220,130,.35) inset}.sheet{position:absolute;z-index:24;left:14px;right:14px;bottom:calc(env(safe-area-inset-bottom) + 90px);max-height:43vh;transform:translateY(calc(100% - 28px));transition:.3s;border:1px solid var(--line);background:rgba(13,9,6,.80);backdrop-filter:blur(20px);border-radius:24px 24px 18px 18px;overflow:hidden}.sheet.open{transform:translateY(0)}.handle{width:58px;height:6px;border-radius:999px;background:rgba(255,232,197,.45);margin:10px auto}.info{display:grid;grid-template-columns:58px 1fr;gap:12px;padding:4px 16px 14px}.badge{width:54px;height:54px;border-radius:16px;display:grid;place-items:center;background:rgba(216,163,58,.22);font-size:27px}.info h2{margin:0 0 2px;font-size:25px;letter-spacing:-.04em}.info p{margin:0;color:#d5c8b7;font-size:15px}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px 16px}.tabs button{border:1px solid var(--line);border-radius:17px;padding:12px 4px;font-weight:850;color:#e8dcc9;background:rgba(255,255,255,.05)}.tabs button.active{background:rgba(216,163,58,.35);border-color:rgba(255,216,120,.5)}.content{padding:0 17px 20px;color:#f0e5d3;font-size:16px;line-height:1.6;display:none}.sheet.open .content{display:block}.minimap{position:absolute;z-index:30;right:15px;top:105px;width:185px;max-width:45vw;padding:10px;display:none}.minimap.show{display:block}.miniwrap{position:relative;border-radius:12px;overflow:hidden}.miniwrap img{width:100%;display:block}.dot{position:absolute;width:12px;height:12px;border-radius:50%;background:#ffca44;box-shadow:0 0 0 4px rgba(255,202,68,.25);transform:translate(-50%,-50%)}.intro{position:absolute;z-index:40;inset:0;display:flex;align-items:center;justify-content:center;background:#050403;transition:.7s}.intro.hide{opacity:0;pointer-events:none}.intro div{text-align:center}.intro h1{font-size:42px;margin:0 0 8px}.intro p{color:#d0b894;margin:0 0 28px}.intro button{padding:14px 30px;border-radius:24px;background:linear-gradient(180deg,#d8a33a,#80551e);font-weight:900}.modeToast{position:absolute;z-index:23;top:calc(env(safe-area-inset-top) + 91px);left:50%;transform:translateX(-50%);padding:8px 14px;border-radius:999px;background:rgba(0,0,0,.40);border:1px solid var(--line);color:#ead7b9;font-size:13px;font-weight:800;opacity:0;transition:.25s}.modeToast.show{opacity:1}@media (max-width:520px){.top{left:12px;right:12px}.top button{min-width:76px;font-size:15px;padding:12px 12px}.title b{font-size:21px}.side{right:10px}.side button{width:54px;height:52px}.sheet{left:10px;right:10px}.bottom{left:10px;right:10px}.arrow{width:48px;height:66px;font-size:36px}.info h2{font-size:24px}}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="stage" id="stage"><img id="scene" class="scene fade" src="scene/overview.jpg" alt="성막 장면"></div>
  <div class="top" id="topbar"><button class="pill" id="homeBtn">전체보기</button><div class="title pill"><small id="area">성막</small><b id="title">전체 조망</b></div><button class="pill" id="miniBtn">미니맵</button></div>
  <button class="arrow left" id="prevBtn">‹</button><button class="arrow right" id="nextBtn">›</button>
  <div class="side" id="tools"><button class="pill txt" id="stepBtn">한걸음</button><button class="pill txt" id="nearBtn">근접</button><button class="pill" id="plusBtn">＋</button><button class="pill" id="minusBtn">－</button></div>
  <div class="modeToast" id="toast">전체 조망</div>
  <div class="minimap pill" id="mini"><div class="miniwrap"><img src="scene/overview.jpg"><i class="dot" id="dot"></i></div></div>
  <section class="sheet" id="sheet"><div class="handle"></div><div class="info"><div class="badge" id="badge">⛺</div><div><h2 id="sheetTitle">성막</h2><p id="sheetDesc">입구에서 지성소까지 이어지는 예배의 동선을 한눈에 봅니다.</p></div></div><div class="tabs"><button class="active">개요</button><button>성경</button><button>의미</button></div><div class="content" id="content">하단 동선 버튼으로 이동하고, 한걸음/근접으로 시점을 바꿉니다.</div></section>
  <div class="bottom" id="bottom"><nav class="nav" id="nav"></nav></div>
  <div class="intro" id="intro"><div><h1>CEN Tabernacle</h1><p>성막을 탐험하는 공간 경험</p><button id="startBtn">탐험 시작</button></div></div>
</div>
<script>
const scenes=[
{id:'entry',name:'입구',area:'바깥뜰',icon:'🚪',near:'scene/entry.jpg',desc:'성막으로 들어가는 유일한 문입니다.',detail:'하나님께 나아가는 예배의 시작점입니다.',pos:[50,88],focus:{x:0,y:95,s:1.2}},
{id:'altar',name:'번제단',area:'바깥뜰',icon:'🔥',near:'scene/altar.jpg',desc:'희생 제물이 드려지는 바깥뜰의 중심 기구',detail:'입구에서 성소로 이어지는 중심축 위에 놓인 첫 기구입니다.',pos:[48,62],focus:{x:0,y:58,s:1.22}},
{id:'laver',name:'물두멍',area:'바깥뜰',icon:'💧',near:'scene/laver.jpg',desc:'제사장이 손과 발을 씻는 정결의 장소',detail:'번제단과 성소 사이 중심축에 놓였습니다. 성소에 들어가기 전 정결을 준비하는 장소입니다.',pos:[55,50],focus:{x:0,y:30,s:1.26}},
{id:'sanctuary',name:'성소',area:'성막 내부',icon:'🕎',near:'scene/sanctuary.jpg',desc:'떡상, 금 등잔대, 분향단이 있는 섬김의 공간',detail:'성소 안에는 금 등잔대, 떡상, 분향단이 함께 있습니다. 먼저 방 전체를 보고, 이후 기구를 더 자세히 탐험합니다.',pos:[52,34],focus:{x:0,y:0,s:1}},
{id:'ark',name:'언약궤',area:'지성소',icon:'📦',near:'scene/ark.jpg',desc:'하나님의 임재를 상징하는 가장 거룩한 기구',detail:'속죄소 위에는 두 그룹이 서로 마주보고 날개를 펴 속죄소를 덮는 형태로 이해됩니다.',pos:[52,24],focus:{x:0,y:0,s:1}}
];
let index=0, view='overview', scale=1, tx=0, ty=0, uiTimer=null, sheetOpen=false, lastDist=0;
const $=id=>document.getElementById(id); const img=$('scene');
function renderNav(){ $('nav').innerHTML=scenes.map((s,i)=>`<button data-i="${i}" class="${i===index?'active':''}"><span class="ico">${s.icon}</span><span>${s.name}</span></button>`).join(''); [...$('nav').children].forEach(b=>b.onclick=()=>go(+b.dataset.i,'step'));}
function setImage(src, contain=false){ if(!img.src.endsWith(src)){ img.classList.remove('fade'); void img.offsetWidth; img.src=src; img.classList.add('fade'); } img.classList.toggle('contain',contain); }
function applyTransform(){ img.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`; }
function setInfo(){ const s=scenes[index]; $('area').textContent=view==='overview'?'성막 전체':s.area; $('title').textContent=view==='overview'?'전체 조망':s.name; $('badge').textContent=s.icon; $('sheetTitle').textContent=s.name; $('sheetDesc').textContent=s.desc; $('content').textContent=s.detail; $('dot').style.left=s.pos[0]+'%'; $('dot').style.top=s.pos[1]+'%'; renderNav(); }
function toast(t){$('toast').textContent=t; $('toast').classList.add('show'); clearTimeout(window.toastT); window.toastT=setTimeout(()=>$('toast').classList.remove('show'),1100)}
function viewOverview(){ view='overview'; scale=1; tx=ty=0; setImage('scene/overview.jpg',false); setInfo(); applyTransform(); toast('전체 조망'); showUI();}
function viewStep(){ view='step'; const s=scenes[index]; if(['sanctuary','ark'].includes(s.id)){ setImage(s.near,true); scale=1; tx=ty=0; toast('한걸음 보기'); } else { setImage('scene/overview.jpg',false); scale=s.focus.s; tx=s.focus.x; ty=s.focus.y; toast('한걸음 보기'); } setInfo(); applyTransform(); showUI();}
function viewNear(){ view='near'; const s=scenes[index]; setImage(s.near,['sanctuary','ark'].includes(s.id)); scale=['sanctuary','ark'].includes(s.id)?1:1.05; tx=ty=0; setInfo(); applyTransform(); toast('근접 보기'); showUI();}
function go(i,mode='step'){ index=(i+scenes.length)%scenes.length; if(mode==='near') viewNear(); else viewStep(); }
function zoomTo(v){ scale=Math.max(1,Math.min(3,v)); if(scale===1){tx=ty=0} applyTransform(); showUI(); }
function showUI(){ ['topbar','tools','bottom'].forEach(id=>$(id).classList.remove('hidden')); $('prevBtn').classList.remove('hidden'); $('nextBtn').classList.remove('hidden'); clearTimeout(uiTimer); uiTimer=setTimeout(()=>{ if(!sheetOpen){['topbar','tools','bottom'].forEach(id=>$(id).classList.add('hidden')); $('prevBtn').classList.add('hidden'); $('nextBtn').classList.add('hidden'); $('mini').classList.remove('show');}},4200); }
function toggleSheet(){ sheetOpen=!sheetOpen; $('sheet').classList.toggle('open',sheetOpen); showUI(); }
$('startBtn').onclick=()=>{$('intro').classList.add('hide'); setTimeout(()=>showUI(),200)};
$('homeBtn').onclick=viewOverview; $('miniBtn').onclick=()=>{$('mini').classList.toggle('show'); showUI();};
$('prevBtn').onclick=()=>go(index-1,view==='near'?'near':'step'); $('nextBtn').onclick=()=>go(index+1,view==='near'?'near':'step');
$('plusBtn').onclick=()=>zoomTo(scale+.22); $('minusBtn').onclick=()=>zoomTo(scale-.22); $('stepBtn').onclick=viewStep; $('nearBtn').onclick=viewNear;
$('sheet').onclick=(e)=>{ if(e.target.className==='handle'||e.target.closest('.handle')) toggleSheet(); else showUI(); };
$('stage').addEventListener('click',()=>showUI());
$('stage').addEventListener('dblclick',(e)=>{e.preventDefault(); scale>1.2?viewStep():viewNear();});
let dragging=false,start={x:0,y:0,tx:0,ty:0};
$('stage').addEventListener('pointerdown',e=>{ dragging=true; start={x:e.clientX,y:e.clientY,tx,ty}; $('stage').setPointerCapture(e.pointerId); showUI();});
$('stage').addEventListener('pointermove',e=>{ if(!dragging||scale<=1.02)return; tx=start.tx+(e.clientX-start.x); ty=start.ty+(e.clientY-start.y); applyTransform();});
$('stage').addEventListener('pointerup',()=>dragging=false);
$('stage').addEventListener('touchstart',e=>{ if(e.touches.length===2){ const a=e.touches[0],b=e.touches[1]; lastDist=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY); }},{passive:false});
$('stage').addEventListener('touchmove',e=>{ if(e.touches.length===2){ e.preventDefault(); const a=e.touches[0],b=e.touches[1]; const d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY); const factor=d/lastDist; scale=Math.max(1,Math.min(3,scale*factor)); lastDist=d; applyTransform(); showUI(); }},{passive:false});
window.addEventListener('popstate',()=>{ if(view!=='overview'){viewOverview(); history.pushState({p:1},'');} }); history.replaceState({p:1},''); history.pushState({p:2},'');
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
renderNav(); viewOverview();
</script>
</body></html>
