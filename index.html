<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#080503">
<title>CEN Tabernacle v2.0</title>
<link rel="manifest" href="manifest.webmanifest">
<style>
:root{--gold:#c89432;--panel:rgba(11,7,4,.72);--line:rgba(255,224,168,.24);--text:#fff7e8;--muted:#d8c8ad}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;overflow:hidden;background:#050302;color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif;touch-action:none;user-select:none}.app{position:fixed;inset:0;background:#050302;overflow:hidden}.stage{position:absolute;inset:0;overflow:hidden;background:#050302;touch-action:none}.sceneImg{position:absolute;left:0;top:0;max-width:none;max-height:none;will-change:transform;transform-origin:0 0;filter:saturate(1.04) contrast(1.04);transition:filter .25s}.shade{position:absolute;inset:0;pointer-events:none;background:linear-gradient(to bottom,rgba(0,0,0,.38),transparent 20%,transparent 70%,rgba(0,0,0,.52));transition:opacity .25s}.ui{position:absolute;inset:0;pointer-events:none;transition:opacity .22s}.app.clean .ui{opacity:0}.btn,.titleBox,.toolPanel,.dock,.sheet,.miniPanel{pointer-events:auto;background:var(--panel);border:1px solid var(--line);backdrop-filter:blur(12px);box-shadow:0 12px 36px rgba(0,0,0,.34)}.top{position:absolute;left:16px;right:16px;top:calc(env(safe-area-inset-top) + 16px);display:grid;grid-template-columns:120px 1fr 120px;gap:12px;align-items:start}.btn{border-radius:24px;color:var(--text);font-weight:900;font-size:22px;padding:18px 12px;text-align:center}.titleBox{border-radius:28px;text-align:center;padding:14px 10px;min-height:72px}.zone{font-size:15px;color:#e4c9a0;font-weight:900}.title{font-size:26px;line-height:1.1;font-weight:1000;margin-top:4px}.sideTools{position:absolute;right:16px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:10px}.circleBtn{width:68px;height:68px;border-radius:26px;display:grid;place-items:center;font-size:27px;font-weight:1000}.viewBtn{font-size:20px;line-height:1.1}.navArrow{position:absolute;top:50%;transform:translateY(-50%);width:70px;height:96px;border-radius:30px;display:grid;place-items:center;font-size:54px;font-weight:300;color:#fff;background:rgba(10,6,3,.5);border:1px solid var(--line);pointer-events:auto}.navArrow.left{left:18px}.navArrow.right{right:18px}.dock{position:absolute;left:18px;right:18px;bottom:calc(env(safe-area-inset-bottom) + 18px);border-radius:28px;padding:12px 12px 10px}.handle{width:76px;height:7px;border-radius:999px;background:rgba(255,239,214,.55);margin:0 auto 9px}.path{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.path button{border:1px solid transparent;background:transparent;color:#d8c8ad;border-radius:20px;padding:9px 4px 11px;font-weight:900;font-size:16px;display:flex;flex-direction:column;align-items:center;gap:4px}.path .ico{font-size:25px}.path button.active{background:linear-gradient(180deg,rgba(202,144,38,.72),rgba(111,73,25,.85));border-color:rgba(255,218,142,.52);color:#fff;box-shadow:0 0 20px rgba(202,144,38,.25)}.sheet{position:absolute;left:18px;right:18px;bottom:calc(env(safe-area-inset-bottom) + 126px);border-radius:26px;padding:14px 18px;transform:translateY(calc(100% - 28px));transition:transform .25s;pointer-events:auto}.sheet.open{transform:translateY(0)}.sheetHead{display:flex;gap:14px;align-items:center}.sheetIcon{width:58px;height:58px;border-radius:18px;background:rgba(157,102,34,.56);display:grid;place-items:center;font-size:30px}.sheet h2{margin:0;font-size:30px}.sheet p{margin:4px 0 0;color:var(--muted);font-size:17px;line-height:1.45}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px}.tabs button{background:rgba(255,255,255,.04);border:1px solid var(--line);color:#fff;border-radius:18px;font-size:17px;font-weight:900;padding:12px}.tabs button.active{background:rgba(180,123,35,.7)}.tabText{font-size:17px;line-height:1.65;color:#fff7e8;margin-top:14px;max-height:22vh;overflow:auto}.toast{position:absolute;left:50%;bottom:calc(env(safe-area-inset-bottom) + 215px);transform:translateX(-50%);background:rgba(30,19,9,.76);border:1px solid var(--line);border-radius:22px;padding:14px 22px;font-size:18px;font-weight:900;opacity:0;transition:opacity .25s;pointer-events:none}.toast.show{opacity:1}.miniPanel{position:absolute;right:16px;top:calc(env(safe-area-inset-top) + 96px);width:156px;border-radius:18px;padding:8px;display:none}.miniPanel.open{display:block}.miniPanel img{width:100%;border-radius:12px;display:block;opacity:.92}.hint{position:absolute;left:50%;top:calc(env(safe-area-inset-top) + 105px);transform:translateX(-50%);padding:10px 16px;border-radius:18px;background:rgba(11,7,4,.58);border:1px solid var(--line);font-size:14px;color:#decaa7;pointer-events:none;opacity:0;transition:opacity .2s}.hint.show{opacity:1}@media(max-width:480px){.top{grid-template-columns:94px 1fr 94px;left:12px;right:12px;gap:8px}.btn{font-size:19px;padding:15px 8px;border-radius:21px}.titleBox{padding:12px 8px;min-height:68px;border-radius:24px}.title{font-size:24px}.zone{font-size:14px}.sideTools{right:12px;gap:8px}.circleBtn{width:61px;height:61px;border-radius:23px;font-size:25px}.viewBtn{font-size:18px}.navArrow{width:58px;height:88px;border-radius:28px;font-size:45px}.navArrow.left{left:12px}.navArrow.right{right:12px}.dock{left:12px;right:12px;bottom:calc(env(safe-area-inset-bottom) + 12px);padding:10px}.path{gap:4px}.path button{font-size:14px;border-radius:17px}.path .ico{font-size:23px}.sheet{left:12px;right:12px;bottom:calc(env(safe-area-inset-bottom) + 112px)}.sheet h2{font-size:27px}.sheet p,.tabText{font-size:16px}.toast{bottom:calc(env(safe-area-inset-bottom) + 198px);font-size:16px}}
</style>
</head>
<body>
<div id="app" class="app">
  <div id="stage" class="stage"><img id="sceneImg" class="sceneImg" draggable="false"><div class="shade"></div></div>
  <div id="ui" class="ui">
    <div class="top"><button id="fitBtn" class="btn">전체보기</button><div class="titleBox"><div id="zone" class="zone">성막</div><div id="title" class="title">전체 조망</div></div><button id="miniBtn" class="btn">미니맵</button></div>
    <button id="prevBtn" class="navArrow left">‹</button><button id="nextBtn" class="navArrow right">›</button>
    <div class="sideTools"><button id="stepBtn" class="btn circleBtn viewBtn">한<br>걸음</button><button id="zoomIn" class="btn circleBtn">+</button><button id="zoomOut" class="btn circleBtn">−</button></div>
    <div id="dock" class="dock"><div class="handle"></div><div id="path" class="path"></div></div>
    <div id="sheet" class="sheet"><div class="handle"></div><div class="sheetHead"><div id="sheetIcon" class="sheetIcon">⛺</div><div><h2 id="sheetTitle">성막</h2><p id="sheetSub">초고해상도 한 장 안을 직접 탐험합니다.</p></div></div><div class="tabs"><button data-tab="overview" class="active">개요</button><button data-tab="bible">성경</button><button data-tab="meaning">의미</button></div><div id="tabText" class="tabText"></div></div>
    <div id="mini" class="miniPanel"><img src="scene/overview.jpg" alt="미니맵"></div>
  </div>
  <div id="toast" class="toast">두 손가락 확대/축소, 드래그로 둘러보세요.</div><div id="hint" class="hint">화면을 터치하면 메뉴가 나타나고 다시 터치하면 사라집니다.</div>
</div>
<script>
const scenes=[
{id:'entry',icon:'🚪',title:'입구',zone:'바깥뜰',img:'scene/entry.jpg',sub:'성막으로 들어가는 유일한 문입니다.',overview:'성막 탐험은 입구에서 시작합니다. 하단 버튼으로 순서대로 이동하거나, 이미지를 확대해 직접 살펴볼 수 있습니다.',bible:'출애굽기 27:16',meaning:'하나님께 나아가는 길이 임의가 아니라 정해진 길을 통해 열린다는 것을 보여줍니다.'},
{id:'altar',icon:'🔥',title:'번제단',zone:'바깥뜰',img:'scene/altar.jpg',sub:'희생 제물이 드려지는 바깥뜰의 중심 기구',overview:'성막에 들어와 가장 먼저 마주하는 기구입니다. 제사가 드려지는 자리입니다.',bible:'출애굽기 27:1-8',meaning:'하나님께 나아가기 전 죄와 희생의 문제를 먼저 마주하게 합니다.'},
{id:'laver',icon:'💧',title:'물두멍',zone:'바깥뜰',img:'scene/laver.jpg',sub:'제사장이 손과 발을 씻는 정결의 장소',overview:'번제단과 성소 사이에 놓인 물두멍입니다. 제사장은 성소에 들어가기 전 이곳에서 씻었습니다.',bible:'출애굽기 30:18-21',meaning:'섬김과 예배 앞에 필요한 정결을 보여줍니다.'},
{id:'sanctuary',icon:'🕎',title:'성소',zone:'성막 내부',img:'scene/sanctuary.jpg',sub:'떡상, 금 등잔대, 분향단이 있는 섬김의 공간',overview:'성소 안에는 떡상, 금 등잔대, 분향단이 있습니다. 한 장의 이미지 안을 확대하고 좌우로 움직이며 살펴보세요.',bible:'출애굽기 25:23-40, 30:1-10',meaning:'하나님 앞에서 드려지는 지속적인 섬김과 임재의 빛을 보여줍니다.'},
{id:'ark',icon:'📦',title:'언약궤',zone:'지성소',img:'scene/ark.jpg',sub:'속죄소와 그룹 아래에 있는 가장 거룩한 기구',overview:'지성소의 중심은 언약궤입니다. 그룹은 서로 마주하고 날개는 속죄소를 덮는 형태로 이해합니다.',bible:'출애굽기 25:10-22, 레위기 16:2',meaning:'하나님의 임재와 속죄의 은혜를 상징하는 중심 기구입니다.'}
];
let idx=0,imgW=0,imgH=0,scale=1,minScale=1,maxScale=5,x=0,y=0,uiVisible=true,hideTimer=null,tab='overview';
const app=document.getElementById('app'),stage=document.getElementById('stage'),img=document.getElementById('sceneImg'),title=document.getElementById('title'),zone=document.getElementById('zone'),path=document.getElementById('path'),sheet=document.getElementById('sheet'),sheetTitle=document.getElementById('sheetTitle'),sheetSub=document.getElementById('sheetSub'),sheetIcon=document.getElementById('sheetIcon'),tabText=document.getElementById('tabText'),toast=document.getElementById('toast'),mini=document.getElementById('mini'),hint=document.getElementById('hint');
function buildPath(){path.innerHTML=scenes.map((s,i)=>`<button data-i="${i}"><span class="ico">${s.icon}</span><span>${s.title}</span></button>`).join('');path.querySelectorAll('button').forEach(b=>b.onclick=e=>{e.stopPropagation();go(+b.dataset.i,'step')});}
function setActive(){path.querySelectorAll('button').forEach((b,i)=>b.classList.toggle('active',i===idx));const s=scenes[idx];title.textContent=s.title;zone.textContent=s.zone;sheetIcon.textContent=s.icon;sheetTitle.textContent=s.title;sheetSub.textContent=s.sub;tabText.textContent=s[tab];document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));}
function fitContain(){const r=stage.getBoundingClientRect();return Math.min(r.width/imgW,r.height/imgH)}
function fitCover(){const r=stage.getBoundingClientRect();return Math.max(r.width/imgW,r.height/imgH)}
function clamp(){const r=stage.getBoundingClientRect(),w=imgW*scale,h=imgH*scale;if(w<=r.width)x=(r.width-w)/2;else x=Math.min(0,Math.max(r.width-w,x));if(h<=r.height)y=(r.height-h)/2;else y=Math.min(0,Math.max(r.height-h,y));}
function apply(){clamp();img.style.width=imgW+'px';img.style.height=imgH+'px';img.style.transform=`translate3d(${x}px,${y}px,0) scale(${scale})`;}
function setScale(ns,cx=innerWidth/2,cy=innerHeight/2){const old=scale;scale=Math.min(maxScale,Math.max(minScale,ns));x=cx-(cx-x)*(scale/old);y=cy-(cy-y)*(scale/old);apply();showUI();}
function whole(){scale=fitContain();minScale=scale;x=(stage.clientWidth-imgW*scale)/2;y=(stage.clientHeight-imgH*scale)/2;apply();showUI();}
function step(){scale=Math.max(fitCover(),fitContain()*1.25);minScale=fitContain();x=(stage.clientWidth-imgW*scale)/2;y=(stage.clientHeight-imgH*scale)/2;apply();showUI();}
function go(i,mode='step'){idx=(i+scenes.length)%scenes.length;const s=scenes[idx];img.onload=()=>{imgW=img.naturalWidth;imgH=img.naturalHeight;maxScale=Math.max(4,fitContain()*6); mode==='whole'?whole():step(); setActive();};img.src=s.img;history.replaceState({idx},'',`#${s.id}`);setActive();}
function showUI(){uiVisible=true;app.classList.remove('clean');clearTimeout(hideTimer);hideTimer=setTimeout(()=>hideUI(),3800)}
function hideUI(){if(sheet.classList.contains('open')||mini.classList.contains('open'))return;uiVisible=false;app.classList.add('clean')}
function toggleUI(){uiVisible?hideUI():showUI();}
let pointers=new Map(),dragging=false,lastX=0,lastY=0,lastDist=0,lastScale=1,lastTap=0;
stage.addEventListener('pointerdown',e=>{stage.setPointerCapture(e.pointerId);pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});if(pointers.size===1){dragging=true;lastX=e.clientX;lastY=e.clientY}else if(pointers.size===2){const p=[...pointers.values()];lastDist=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);lastScale=scale}showUI();});
stage.addEventListener('pointermove',e=>{if(!pointers.has(e.pointerId))return;pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});if(pointers.size===2){const p=[...pointers.values()],d=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y),cx=(p[0].x+p[1].x)/2,cy=(p[0].y+p[1].y)/2;setScale(lastScale*(d/lastDist),cx,cy)}else if(dragging&&pointers.size===1){x+=e.clientX-lastX;y+=e.clientY-lastY;lastX=e.clientX;lastY=e.clientY;apply();}});
function up(e){pointers.delete(e.pointerId);if(pointers.size<2)lastDist=0;if(pointers.size===0){dragging=false;const now=Date.now();if(now-lastTap<280){scale<fitCover()*1.5?setScale(fitCover()*2,e.clientX,e.clientY):step();lastTap=0}else lastTap=now;}}stage.addEventListener('pointerup',up);stage.addEventListener('pointercancel',up);
document.getElementById('fitBtn').onclick=e=>{e.stopPropagation();whole()};document.getElementById('stepBtn').onclick=e=>{e.stopPropagation();step()};document.getElementById('zoomIn').onclick=e=>{e.stopPropagation();setScale(scale*1.25)};document.getElementById('zoomOut').onclick=e=>{e.stopPropagation();setScale(scale/1.25)};document.getElementById('prevBtn').onclick=e=>{e.stopPropagation();go(idx-1,'step')};document.getElementById('nextBtn').onclick=e=>{e.stopPropagation();go(idx+1,'step')};document.getElementById('miniBtn').onclick=e=>{e.stopPropagation();mini.classList.toggle('open');showUI()};sheet.onclick=e=>{e.stopPropagation();sheet.classList.toggle('open');showUI()};document.querySelectorAll('.tabs button').forEach(b=>b.onclick=e=>{e.stopPropagation();tab=b.dataset.tab;setActive();sheet.classList.add('open');showUI()});stage.addEventListener('click',e=>{if(e.target===stage||e.target===img)toggleUI()});window.addEventListener('resize',()=>step());window.addEventListener('popstate',()=>go(0,'whole'));
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js');
buildPath();go(0,'whole');setTimeout(()=>{toast.classList.add('show');hint.classList.add('show');setTimeout(()=>{toast.classList.remove('show');hint.classList.remove('show')},3200)},700);
</script>
</body>
</html>
